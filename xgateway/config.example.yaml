# x402 config — required when any rule uses scheme "exact" or "upto".
x402:
  - name: "x402-base-exact"
    facilitator_url: "https://x402.dexter.cash"
    network: "eip155:84532"                               # Base Sepolia (CAIP-2)
    scheme: "exact"                                       # Default x402 scheme for rules that don't specify one.
    sync_facilitator_on_start: true
    timeout_seconds: 30
    merchant: "0xEb6ae6fA22D307Eae06BE0862087FdFFdD25Bab4" #pay_to address
    asset: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913" # USDC on Base Mainnet (CAIP-19)
  - name: "x402-base-upto"
    facilitator_url: "https://x402.dexter.cash"
    network: "eip155:84532"                               # Base Sepolia (CAIP-2)
    scheme: "upto"                                       # Default x402 scheme for rules that don't specify one.
    sync_facilitator_on_start: true
    timeout_seconds: 30
    merchant: "0xEb6ae6fA22D307Eae06BE0862087FdFFdD25Bab4" #pay_to address
    asset: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"

mpp:
  - name: "tempo-charge-usdc"
    method: "tempo"
    rpc_url: "http://localhost:4022"
    scheme: "charge"                                       # Default x402 scheme for rules that don't specify one.
    merchant: "0xEb6ae6fA22D307Eae06BE0862087FdFFdD25Bab4" #pay_to address
    asset: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"

  - name: "x402-base-session"
    method: "tempo"
    rpc_url: "http://localhost:4022"
    scheme: "session"                                       # Default x402 scheme for rules that don't specify one.    timeout_seconds: 30
    merchant: "0xEb6ae6fA22D307Eae06BE0862087FdFFdD25Bab4" #pay_to address
    asset: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"

  - name: "stripe-charge-usd"
    method: "stripe"
    rpc_url: "http://localhost:4022"
    scheme: "charge"                                       # Default x402 scheme for rules that don't specify one.    timeout_seconds: 30
    merchant: "0xEb6ae6fA22D307Eae06BE0862087FdFFdD25Bab4" #pay_to address
    asset: "USD" # USD currency codec

outbound:
  target: "http://localhost:4021"
  allow_unmatched: false                                  # false = 403 for unconfigured routes; true = proxy freely
  auth_header:
    enable: true # true | false
    name: ""
    value: "Bearer YOUR_UPSTREAM_ACCESS_TOKEN"
  rules:
    - name: "health"
      path: "/health"
      price: "$0.001"
      description: "Get weather data"
    - name: "metered-api"
      path: "/api/metered/*"
      price: "$0.10"                                      # Maximum authorized amount.
      description: "Metered API billed by actual usage"
    - name: "weather"
      path: "/weather"
      price: "$0.10"                                      # Maximum authorized amount.
      description: "get weather data"
      payment_methods: [ "x402-base-exact"]
    - name: "free-endpoint"
      path: "/free-endpoint"
      free: true
      description: "Free endpoint, no payment required"
    - name: "free-multipoint"
      path: "/free-multipoint"
      free: true
      description: "Free multipoint root, no payment required"
    - name: "free-multipoint-sub"
      path: "/free-multipoint/*"
      free: true
      description: "Free multipoint with subpath, no payment required"
