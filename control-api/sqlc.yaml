version: "2"

sql:
  - engine: "postgresql"
    queries:
      - "internal/storage/postgres/queries"
    schema:
      - "migrations"
    gen:
      go:
        package: "postgres"
        out: "internal/storage/postgres/generated"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type: "github.com/google/uuid.UUID"

          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true

          - db_type: "text"
            nullable: false
            go_type: "string"

          - db_type: "varchar"
            nullable: true
            go_type:
              type: "string"
              pointer: true

          - db_type: "varchar"
            nullable: false
            go_type: "string"
