openapi: 3.0.3
info:
  title: xpaywall Control API
  version: 1.0.0
  description: |
    Control plane REST API for the xpaywall payment gateway.

    **Security schemes:**
    - `BearerAuth` — JWT token from `/auth/login`, used by the admin panel
    - `ApiKeyAuth` — `X-Api-Key` header, used by xgateway for internal/proxy endpoints

    **Endpoint naming:**
    - `_` prefix — actively used (frontend adminpanel or xgateway)
    - `[FUTURE]` prefix — defined in the API but not yet consumed by any client

servers:
  - url: http://localhost:9091
    description: Local development

tags:
  - name: Auth
    description: Login and current-user endpoints
  - name: System
    description: System configuration
  - name: Users
    description: Admin user management
  - name: Projects
    description: Project CRUD and settings
  - name: Outbound Routes
    description: Per-project proxy routing rules
  - name: Payment Methods
    description: Payment protocol/chain definitions
  - name: Payment Method Assets
    description: On-chain token assets linked to payment methods
  - name: Facilitators
    description: x402 facilitator service registry
  - name: Project Payment Methods
    description: Links projects to payment methods with payout config
  - name: Request Logs
    description: Inbound request audit log (read by panel, written by xgateway)
  - name: Stats
    description: Dashboard statistics and charts
  - name: Gateway
    description: Endpoints called by xgateway (API key protected)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: "unauthorized"

    # ── Auth ──────────────────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: supersecret

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string

    # ── Users ─────────────────────────────────────────────────────────────────

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 8

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          nullable: true

    # ── Projects ──────────────────────────────────────────────────────────────

    ProjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        owner_username:
          type: string
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FullProjectResponse:
      allOf:
        - $ref: '#/components/schemas/ProjectResponse'
        - type: object
          properties:
            route_settings_id:
              type: string
              format: uuid
              nullable: true
            base_url:
              type: string
            auth_header_name:
              type: string
              nullable: true
            auth_header_value:
              type: string
              nullable: true
            allow_unmatched:
              type: boolean

    ProjectWithConfigResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        owner_username:
          type: string
        name:
          type: string
        slug:
          type: string
        enabled:
          type: boolean
        base_url:
          type: string
          nullable: true
        payment_methods:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name, slug, base_url]
      properties:
        name:
          type: string
          example: My API
        slug:
          type: string
          example: my-api
        base_url:
          type: string
          example: http://upstream:4021
        auth_header_name:
          type: string
          nullable: true
        auth_header_value:
          type: string
          nullable: true
        allow_unmatched:
          type: boolean
          default: false

    UpdateProjectRequest:
      type: object
      required: [base_url]
      properties:
        name:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        base_url:
          type: string
        auth_header_name:
          type: string
          nullable: true
        auth_header_value:
          type: string
          nullable: true
        allow_unmatched:
          type: boolean

    # ── Outbound Routes ───────────────────────────────────────────────────────

    OutboundRouteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        project_name:
          type: string
        project_slug:
          type: string
        name:
          type: string
        path_pattern:
          type: string
        price_amount:
          type: integer
          format: int32
          description: Price in smallest currency unit
        price_usd:
          type: string
          description: Human-readable USD price, e.g. "0.01"
        description:
          type: string
        free:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOutboundRouteRequest:
      type: object
      required: [project_id, name, path_pattern]
      properties:
        project_id:
          type: string
          format: uuid
        name:
          type: string
          example: Search endpoint
        path_pattern:
          type: string
          example: /api/search
        price_amount:
          type: integer
          format: int32
        price_usd:
          type: string
          example: "0.01"
        description:
          type: string
        free:
          type: boolean
          default: false

    UpdateOutboundRouteRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        path_pattern:
          type: string
          nullable: true
        price_amount:
          type: integer
          format: int32
          nullable: true
        price_usd:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        free:
          type: boolean
          nullable: true

    # ── Payment Methods ───────────────────────────────────────────────────────

    PaymentMethodResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: x402-base
        protocol:
          type: string
          example: x402
        name:
          type: string
          example: x402 on Base
        caip2_chain_id:
          type: string
          nullable: true
          example: eip155:8453
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePaymentMethodRequest:
      type: object
      required: [code, protocol, name]
      properties:
        code:
          type: string
          example: x402-base
        protocol:
          type: string
          example: x402
        name:
          type: string
          example: x402 on Base
        caip2_chain_id:
          type: string
          nullable: true
          example: eip155:8453
        enabled:
          type: boolean
          default: true

    UpdatePaymentMethodRequest:
      type: object
      properties:
        code:
          type: string
          nullable: true
        protocol:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        caip2_chain_id:
          type: string
          nullable: true
        enabled:
          type: boolean
          nullable: true

    # ── Payment Method Assets ─────────────────────────────────────────────────

    PaymentMethodAssetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_method_id:
          type: string
          format: uuid
        payment_method_name:
          type: string
        payment_method_chain:
          type: string
          nullable: true
        symbol:
          type: string
          example: USDC
        contract_address:
          type: string
          nullable: true
          example: "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"
        decimals:
          type: integer
          format: int32
          example: 6
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePaymentMethodAssetRequest:
      type: object
      required: [payment_method_id, symbol, decimals]
      properties:
        payment_method_id:
          type: string
          format: uuid
        symbol:
          type: string
          example: USDC
        contract_address:
          type: string
          nullable: true
        decimals:
          type: integer
          format: int32
          example: 6

    UpdatePaymentMethodAssetRequest:
      type: object
      properties:
        symbol:
          type: string
          nullable: true
        contract_address:
          type: string
          nullable: true
        decimals:
          type: integer
          format: int32
          nullable: true

    # ── Facilitators ──────────────────────────────────────────────────────────

    FacilitatorResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          example: https://facilitator.example.com
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateFacilitatorRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
          example: Main Facilitator
        url:
          type: string
          example: https://facilitator.example.com
        enabled:
          type: boolean
          default: true

    UpdateFacilitatorRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        enabled:
          type: boolean
          nullable: true

    # ── Project Payment Methods ───────────────────────────────────────────────

    ProjectPaymentMethodResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        payment_method_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        scheme:
          type: string
          example: exact
        facilitator_id:
          type: string
          format: uuid
        payout_address:
          type: string
          nullable: true
          example: "0xYourWalletAddress"
        config:
          type: string
          format: byte
          nullable: true
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectPaymentMethodRequest:
      type: object
      required: [project_id, payment_method_id, asset_id, scheme, facilitator_id]
      properties:
        project_id:
          type: string
          format: uuid
        payment_method_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        scheme:
          type: string
          example: exact
        facilitator_id:
          type: string
          format: uuid
        payout_address:
          type: string
          nullable: true
        config:
          type: string
          format: byte
          nullable: true
        enabled:
          type: boolean
          default: true

    UpdateProjectPaymentMethodRequest:
      type: object
      properties:
        scheme:
          type: string
          nullable: true
        facilitator_id:
          type: string
          format: uuid
          nullable: true
        payout_address:
          type: string
          nullable: true
        config:
          type: string
          format: byte
          nullable: true
        enabled:
          type: boolean
          nullable: true

    # ── Request Logs ──────────────────────────────────────────────────────────

    RequestLogResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        outbound_route_id:
          type: string
          format: uuid
          nullable: true
        request_id:
          type: string
        method:
          type: string
          example: GET
        path:
          type: string
          example: /api/search
        client_ip:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        status:
          type: string
          example: completed
        payment_required:
          type: boolean
        payment_requested_at:
          type: string
          format: date-time
          nullable: true
        payment_completed:
          type: boolean
        payment_completed_at:
          type: string
          format: date-time
          nullable: true
        payment_channel_id:
          type: string
          format: uuid
          nullable: true
        payment_channel_asset_id:
          type: string
          format: uuid
          nullable: true
        amount_paid:
          type: integer
          format: int64
          nullable: true
        amount_usd:
          type: string
          nullable: true
        upstream_url:
          type: string
          nullable: true
        upstream_status_code:
          type: integer
          format: int32
          nullable: true
        upstream_response_time_ms:
          type: integer
          format: int32
          nullable: true
        final_status_code:
          type: integer
          format: int32
          nullable: true
        error_type:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateRequestLogRequest:
      type: object
      required: [project_id, request_id, method, path, status]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Optional client-assigned ID
        project_id:
          type: string
          format: uuid
        outbound_route_id:
          type: string
          format: uuid
          nullable: true
        request_id:
          type: string
        method:
          type: string
          example: GET
        path:
          type: string
          example: /api/search
        client_ip:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        status:
          type: string
          example: pending
        payment_required:
          type: boolean
        payment_requested_at:
          type: string
          format: date-time
          nullable: true
        payment_completed:
          type: boolean
        payment_completed_at:
          type: string
          format: date-time
          nullable: true
        payment_channel_id:
          type: string
          format: uuid
          nullable: true
        payment_channel_asset_id:
          type: string
          format: uuid
          nullable: true
        amount_paid:
          type: integer
          format: int64
          nullable: true
        amount_usd:
          type: string
          nullable: true
        upstream_url:
          type: string
          nullable: true
        upstream_status_code:
          type: integer
          format: int32
          nullable: true
        upstream_response_time_ms:
          type: integer
          format: int32
          nullable: true
        final_status_code:
          type: integer
          format: int32
          nullable: true
        error_type:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    UpdateRequestLogRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: completed
        outbound_route_id:
          type: string
          format: uuid
          nullable: true
        payment_required:
          type: boolean
        payment_requested_at:
          type: string
          format: date-time
          nullable: true
        payment_completed:
          type: boolean
        payment_completed_at:
          type: string
          format: date-time
          nullable: true
        payment_channel_id:
          type: string
          format: uuid
          nullable: true
        payment_channel_asset_id:
          type: string
          format: uuid
          nullable: true
        amount_paid:
          type: integer
          format: int64
          nullable: true
        amount_usd:
          type: string
          nullable: true
        upstream_url:
          type: string
          nullable: true
        upstream_status_code:
          type: integer
          format: int32
          nullable: true
        upstream_response_time_ms:
          type: integer
          format: int32
          nullable: true
        final_status_code:
          type: integer
          format: int32
          nullable: true
        error_type:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    RequestEventResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        request_log_id:
          type: string
          format: uuid
        event_type:
          type: string
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateRequestEventRequest:
      type: object
      required: [request_log_id, event_type]
      properties:
        request_log_id:
          type: string
          format: uuid
        event_type:
          type: string
        metadata:
          type: object
          nullable: true

    # ── Stats ─────────────────────────────────────────────────────────────────

    DashboardStatsResponse:
      type: object
      properties:
        period:
          $ref: '#/components/schemas/PeriodStats'
        previous_period:
          $ref: '#/components/schemas/PeriodStats'

    PeriodStats:
      type: object
      properties:
        range:
          type: object
          properties:
            from:
              type: string
            to:
              type: string
        total_projects:
          type: integer
          format: int64
        total_routes:
          type: integer
          format: int64
        total_requests:
          type: integer
          format: int64
        total_earnings_usd:
          type: number
          format: double
        success_rate:
          type: number
          format: double

    ChartStatsResponse:
      type: object
      properties:
        granularity:
          type: string
          example: day
        points:
          type: array
          items:
            $ref: '#/components/schemas/DailyStatPoint'

    DailyStatPoint:
      type: object
      properties:
        time:
          type: string
          example: "2024-01-15"
        total_requests:
          type: integer
          format: int64
        earnings_usd:
          type: number
          format: double

    TopRouteItem:
      type: object
      properties:
        path_pattern:
          type: string
        price_usd:
          type: string
        total_requests:
          type: integer
          format: int64
        revenue_usd:
          type: number
          format: double

    RecentRequestItem:
      type: object
      properties:
        id:
          type: string
        path:
          type: string
        method:
          type: string
        created_at:
          type: string
        status_code:
          type: integer
          format: int32
        payment_channel:
          type: string
          nullable: true
        amount_usd:
          type: string
          nullable: true

    # ── Gateway ───────────────────────────────────────────────────────────────

    ResolveRouteResponse:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        outbound_route_id:
          type: string
          format: uuid
        name:
          type: string
        inbound_path:
          type: string
        target:
          type: string
          example: http://upstream:4021/api/search
        auth_header_name:
          type: string
        auth_header_value:
          type: string
        allow_unmatched:
          type: boolean
        price:
          type: string
          example: "0.01"
        free:
          type: boolean
        mime_type:
          type: string
        description:
          type: string
        payment_channels:
          type: array
          items:
            $ref: '#/components/schemas/ChannelDTO'

    ChannelDTO:
      type: object
      properties:
        protocol:
          type: string
          example: x402
        code:
          type: string
          example: x402-base
        scheme:
          type: string
          example: exact
        caip2_chain_id:
          type: string
          example: eip155:8453
        facilitator_url:
          type: string
        payout_address:
          type: string
        asset_symbol:
          type: string
          example: USDC
        enabled:
          type: boolean
        payment_method_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid

# ═════════════════════════════════════════════════════════════════════════════
# PATHS
# ═════════════════════════════════════════════════════════════════════════════

paths:

  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: "_ Login"
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token and user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: "_ Get Current User"
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── System ───────────────────────────────────────────────────────────────────

  /api/v1/system/proxy-url:
    get:
      tags: [System]
      summary: "_ Get Proxy URL"
      operationId: getProxyUrl
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Public URL of the xgateway proxy
          content:
            application/json:
              schema:
                type: object
                properties:
                  proxy_url:
                    type: string
                    example: http://localhost:8081

  # ── Users ────────────────────────────────────────────────────────────────────

  /api/v1/users:
    get:
      tags: [Users]
      summary: "[FUTURE] List Users"
      operationId: listUsers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
    post:
      tags: [Users]
      summary: "[FUTURE] Create User"
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Users]
      summary: "[FUTURE] Get User"
      operationId: getUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User by ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Not found
    put:
      tags: [Users]
      summary: "[FUTURE] Update User"
      operationId: updateUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      tags: [Users]
      summary: "[FUTURE] Delete User"
      operationId: deleteUser
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Deleted

  # ── Projects ─────────────────────────────────────────────────────────────────

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: "_ List Projects"
      operationId: listProjects
