  # ── Gateway ───────────────────────────────────────────────────────────────────

  /proxy/resolve/{path}:
    get:
      tags: [Gateway]
      summary: "_ Resolve Route (xgateway)"
      operationId: resolveRoute
      description: |
        Called by xgateway per incoming request to resolve the matching outbound
        route and payment channels. Path format: `{projectSlug}/{inboundPath}`.
        Requires `X-Api-Key` header.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: "Wildcard path in format: {projectSlug}/{inboundPath}"
          example: my-api/api/search
      responses:
        '200':
          description: Resolved route with payment channel config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveRouteResponse'
        '404':
          description: No matching route found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid API key
