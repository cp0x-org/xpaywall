          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: List outbound routes
      tags:
      - outbound-routes
    post:
      consumes:
      - application/json
      parameters:
      - description: Route data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createOutboundRouteRequest'
      produces:
