          $ref: '#/definitions/auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.errorResponse'
      summary: Login
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.userResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/auth.errorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /proxy/resolve/{path}:
    get:
      parameters:
      - description: Path in format {projectSlug}/{inboundPath}
        in: path
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gateway.resolveRouteResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gateway.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gateway.errorResponse'
      security:
      - ApiKeyAuth: []
      summary: Resolve route
      tags:
      - gateway
securityDefinitions:
  ApiKeyAuth:
    description: Internal API key shared between xgateway and control-api
    in: header
    name: X-Api-Key
    type: apiKey
  BearerAuth:
    description: 'JWT token. Format: "Bearer {token}"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
